[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [".dvc", "data", "notebooks"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "W"]
ignore = ["E501"]  # black handles line length

[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
/(
    \.dvc
  | data
  | notebooks
)/
'''

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
files = ["src"]
exclude = "(^|/)(\\.dvc|data|notebooks)/"
