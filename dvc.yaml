stages:
  ingest:
    cmd: python -m src.ingest.main --params params.yaml
    deps:
      - src/ingest
      - data/raw/solcast.csv
    params:
      - data
      - splits
      - paths
    outs:
      - data/interim/parquet
      - data/interim/splits.json

  features:
    cmd: python -m src.features.main --params params.yaml
    deps:
      - src/features
      - src/ingest/splits.py
      - src/ingest/schema.py
      - data/interim/parquet
      - data/interim/splits.json
    params:
      - site
      - features
      - splits
      - paths
    outs:
      - data/features/train.parquet
      - data/features/promo.parquet
      - data/features/replay.parquet
      - data/features/features_manifest.json
