# MinIO + MLflow credentials for the T8 Kubeflow pipeline pods.
# Lives in the kubeflow namespace because KFP run pods are spawned there.
#
# Values are the defaults from k8s/README.md. If you rotated MinIO creds
# during the platform install, update them here and re-apply.
apiVersion: v1
kind: Secret
metadata:
  name: solar-mlops-creds
  namespace: kubeflow
type: Opaque
stringData:
  MLFLOW_TRACKING_URI: "http://mlflow.mlflow.svc.cluster.local"
  MLFLOW_S3_ENDPOINT_URL: "http://minio.minio.svc.cluster.local:9000"
  AWS_ACCESS_KEY_ID: "minioadmin"
  AWS_SECRET_ACCESS_KEY: "minioadmin123"
