# MinIO + MLflow credentials for the serving Deployment in the `solar` ns.
# Mirrors k8s/pipelines/secret.yaml — keep the values in sync if rotated.
apiVersion: v1
kind: Secret
metadata:
  name: solar-mlops-creds
  namespace: solar
type: Opaque
stringData:
  MLFLOW_TRACKING_URI: "http://mlflow.mlflow.svc.cluster.local"
  MLFLOW_S3_ENDPOINT_URL: "http://minio.minio.svc.cluster.local:9000"
  AWS_ACCESS_KEY_ID: "minioadmin"
  AWS_SECRET_ACCESS_KEY: "minioadmin123"
