# One-shot demo Job: replays the full 6-month window once and exits.
#
# Two containers in one pod:
#
#   initContainer `fetch-features` — pulls the Stage 2 replay.parquet from
#     MinIO into a shared emptyDir using the same `src.common.fetch_features`
#     helper the T8 training pods use. Keyed by GIT_COMMIT_OVERRIDE so the
#     replay reads the same features the serving model was promoted on.
#
#   container `replay` — runs `python -m src.replay.client`, posts to the
#     serving Service, and exposes /metrics on :9090 for the platform
#     Prometheus to scrape (label `app: solar-replay` matches the headless
#     Service + ServiceMonitor in this directory).
#
# To run another demo, delete the Job (`kubectl delete -f k8s/replay/job-demo.yaml`)
# and re-apply. We don't enable `parallelism` — one walker is plenty at 500 rps.
apiVersion: batch/v1
kind: Job
metadata:
  name: solar-replay-demo
  namespace: solar
  labels:
    app: solar-replay
    role: demo
spec:
  backoffLimit: 0           # don't retry on failure — surface it
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: solar-replay
        role: demo
    spec:
      restartPolicy: Never
      volumes:
        - name: data
          emptyDir: {}
      initContainers:
        - name: fetch-features
          image: solar-replay:90f1ba7-t12
          imagePullPolicy: Never
          command: ["python", "-m", "src.common.fetch_features"]
          env:
            # Replay reads the most recently published Stage 2 feature set
            # from MinIO. Stage 2 outputs are deterministic given params.yaml
            # + the ingest schema; the last `scripts/02_publish_features.sh`
            # run is the authoritative source. Update this when you re-run
            # feature publish so the demo always uses the latest snapshot.
            - name: GIT_COMMIT_OVERRIDE
              value: "fe404bd9d5d3757a7815392453e358318910d1ce"
            - name: MLFLOW_S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: solar-mlops-creds
                  key: MLFLOW_S3_ENDPOINT_URL
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: solar-mlops-creds
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: solar-mlops-creds
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      containers:
        - name: replay
          image: solar-replay:90f1ba7-t12
          imagePullPolicy: Never
          command: ["python", "-m", "src.replay.client"]
          args:
            - --endpoint
            - http://solar-serve.solar.svc.cluster.local:80
            - --speedup
            - "500"
            - --metrics-port
            - "9090"
            - --features
            - /app/data/features/replay.parquet
            - --params
            - /app/params.yaml
            - --request-timeout
            - "10"
          ports:
            - name: metrics
              containerPort: 9090
          env:
            # Keep the pod alive ~45s after the loop finishes so Prometheus
            # (15s scrape interval) gets at least one scrape of the final state.
            - name: SOLAR_REPLAY_LINGER_S
              value: "45"
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
