# Shared secret used to authenticate Alertmanager → retrain webhook calls.
#
# DO NOT use this placeholder value in any cluster you care about. Rotate it
# locally with:
#
#   TOKEN=$(python -c "import secrets; print(secrets.token_hex(32))")
#   kubectl create secret generic solar-retrain-webhook \
#     -n monitoring \
#     --from-literal=WEBHOOK_TOKEN=$TOKEN \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# The Alertmanager receiver config must use the same token in its
# `Authorization: Bearer …` header — see alertmanager-config.yaml in this dir.
apiVersion: v1
kind: Secret
metadata:
  name: solar-retrain-webhook
  namespace: monitoring
type: Opaque
stringData:
  # 64-char hex placeholder — replace before applying for real.
  WEBHOOK_TOKEN: "REPLACE_ME_WITH_RANDOM_64_HEX_CHARS_0000000000000000000000000000"
